<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num=prompt("Enter number: ");
        let rev=0;
        let t=num;

        while(t>0){
            rev=rev*10+(t%10);
            t=t/10|0;
            document.write("rev");
        }
    </script>
</body>
</html>
